
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>VextriaHub v12 - Assistente Jurídico Inteligente</title>
    <meta name="description" content="Assistente jurídico com IA para advogados autônomos e pequenos escritórios" />
    <meta name="author" content="VextriaHub" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/favicon.png" type="image/png">

    <meta property="og:title" content="VextriaHub - Assistente Jurídico Inteligente" />

    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Aplica o tema salvo no <html> antes do React montar (evita flash) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'auto';
          var resolved = t === 'auto'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : t;
          var classes = resolved === 'blue' ? ['dark', 'blue'] : [resolved];
          document.documentElement.classList.add.apply(document.documentElement.classList, classes);
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
